<!DOCTYPE html>             <!-- 문서 형식 지정. HTML5로 정의하는 선언문 -->
<html lang="ko">            <!-- HTML 문서의 시작. lang 속성: 문서의 주 언어를 지정 -->
<head>          <!-- 문서의 설명, 설정을 작성하는 부분. 화면 상으로는 표시되지 않음. -->
    <meta charset="UTF-8">  <!-- 문자 인코딩 설정. UTF-8 로 설정하면 한글 깨짐 방지. -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0">  <!-- 반응형 웹 디자인을 위한 뷰포트 설정 -->
    <title>HTML 기본 태그</title> <!-- 웹 문서의 제목 정의. 브라우저 탭에 표시됨. -->
</head>
<body>          <!-- 실제 화면(브라우저)에 보이는 부분. -->
    
    <!-- 제목 태그 (h1 ~ h6)-->
    <h1>가장 큰 제목(대제목)</h1>
    <h2>두번째로 큰 제목(부제목)</h2>
    <h3>세번째 제목(소제목)</h3>
    <h4>제목 4</h4>
    <h5>제목 5</h5>
    <h6>제목 6</h6>
    <!-- 숫자가 커질 수록 글자 크기는 작아지고, 중요도는 낮아짐! -->
    일반 텍스트
    <h7>제목 7 (존재하지 않는 태그)</h7>
    <!-- 
        h7은 HTML 표준에 존재하지 않는 태그지만,
        오류 발생 없이 일반 텍스트처럼 화면에 표시됨!
     -->
    <hr> <!-- 수평선 태그 -->
</body>
</html>
